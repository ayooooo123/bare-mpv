name: Prebuild

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prebuild:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
          - os: ubuntu-24.04
            platform: android
            arch: arm64
            flags: -D ANDROID_STL=c++_shared
          - os: ubuntu-24.04
            platform: android
            arch: arm
            flags: -D ANDROID_STL=c++_shared
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: macos-14
            platform: darwin
            arch: x64
          - os: macos-14
            platform: ios
            arch: arm64
          - os: macos-14
            platform: ios
            arch: arm64
            tags: -simulator
            flags: --simulator

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.tags }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          cache: false
          go-version: stable

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install deps (Linux native)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build nasm python3 python3-pip pkgconf \
            libva-dev libdrm-dev libasound2-dev \
            clang lld
          sudo pip3 install meson --upgrade

      - name: Install deps (Android)
        if: matrix.platform == 'android'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build nasm python3 python3-pip pkgconf
          sudo pip3 install meson --upgrade

      - name: Install deps (macOS / iOS)
        if: runner.os == 'macOS'
        run: brew install meson nasm pkg-config ninja

      - run: npm install -g bare-make
      - run: npm install

      - name: Build prebuilds (fresh, no cache)
        run: |
          rm -rf build
          bare-make generate --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} ${{ matrix.flags }}
          bare-make build
          bare-make install --prefix prebuilds

      - uses: holepunchto/actions/upload-prebuilds@v1
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          tags: ${{ matrix.tags }}
          prefix: prebuilds

  merge:
    runs-on: ubuntu-latest
    needs: prebuild
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: holepunchto/actions/merge-prebuilds@v1

      - uses: actions/download-artifact@v4
        with:
          name: prebuilds
          path: prebuilds

      - name: Commit prebuilds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prebuilds/
          git diff --staged --quiet || git commit -m "chore: update prebuilds [skip ci]"
          git push
