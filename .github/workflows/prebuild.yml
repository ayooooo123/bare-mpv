name: Prebuild

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'binding.cc'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'vendor/mpv'

jobs:
  prebuild:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64
          - os: ubuntu-22.04
            platform: linux
            arch: x64

          # Linux arm64
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64

          # macOS arm64 (Apple Silicon)
          - os: macos-14
            platform: darwin
            arch: arm64

          # macOS x64 (Intel, runs under Rosetta on macos-14)
          - os: macos-14
            platform: darwin
            arch: x64

          # Android arm64
          - os: ubuntu-24.04
            platform: android
            arch: arm64
            flags: -D ANDROID_STL=c++_shared

          # Android arm
          - os: ubuntu-24.04
            platform: android
            arch: arm
            flags: -D ANDROID_STL=c++_shared

          # iOS arm64 (device)
          - os: macos-14
            platform: ios
            arch: arm64

          # iOS arm64 simulator
          - os: macos-14
            platform: ios
            arch: arm64
            tags: -simulator
            flags: --simulator

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.tags }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # Linux deps
      - name: Install Linux deps
        if: runner.os == 'Linux' && matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build nasm python3 pkg-config \
            libva-dev libdrm-dev libasound2-dev

      # Android deps (Linux host, no system audio libs needed)
      - name: Install Android build deps
        if: matrix.platform == 'android'
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build nasm python3 pkg-config

      # macOS / iOS deps
      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: |
          brew install meson nasm pkg-config ninja

      - uses: actions/setup-go@v5
        with:
          cache: false
          go-version: stable

      - run: npm install -g bare-runtime bare-make
      - run: npm install

      - name: Generate
        run: bare-make generate --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} ${{ matrix.flags }} --release

      - name: Build
        run: bare-make build --release
        timeout-minutes: 90

      - name: Install
        run: bare-make install --release

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.tags }}
          path: prebuilds/

  commit:
    runs-on: ubuntu-latest
    needs: prebuild
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: prebuilds
          merge-multiple: true

      - name: Commit prebuilds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prebuilds/
          git diff --staged --quiet || git commit -m "chore: update prebuilds [skip ci]"
          git push
